name: data_pipeline_trigger

on:
  workflow_dispatch:
  repository_dispatch:
    types: [data_pipeline_trigger]

jobs:
  data_pipeline:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Doppler CLI
        uses: dopplerhq/cli-action@v1

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version-file: ".python-version"

      - name: Install dependencies
        run: uv sync

      - name: Cache Scrapy HTTP Cache
        uses: actions/cache@v4
        with:
          path: .scrapy
          key: ${{ runner.os }}-scrapy-cache-${{ github.workflow }}
          restore-keys: |
            ${{ runner.os }}-scrapy-cache-

      - name: step_setup_workflow
        if: ${{ github.event_name == 'workflow_dispatch' || github.event.client_payload.step_setup_workflow == true }}
        env:
          DOPPLER_TOKEN: ${{ secrets.DOPPLER_TOKEN }}
        run: |
          doppler run -p 20206205tech -c prd -- uv run python step_setup_workflow.py

      - name: HAI
        if: ${{ github.event_name == 'workflow_dispatch' || github.event.client_payload.HAI == true }}
        env:
          DOPPLER_TOKEN: ${{ secrets.DOPPLER_TOKEN }}
        run: |
          doppler run -p 20206205tech -c prd -- uv run python HAI.py
